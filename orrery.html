<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Model (Orrery) CMSC405 Computer Graphics</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 10, 20, 0.85);
            color: #eee;
            padding: 18px 20px;
            border-radius: 12px;
            border: 1px solid #3a4a6a;
            min-width: 260px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            max-height: calc(100vh - 30px);
            overflow-y: auto;
            transition: width 260ms ease, padding 260ms ease, background-color 260ms ease, opacity 260ms ease;
        }

        /* Minimized state: keep only heading, date and instructions visible */
        #ui-container.minimized {
            width: 300px;
            padding: 10px 12px;
            min-width: 0;
            max-height: none;
            overflow: visible;
            background: rgba(8, 8, 12, 0.75);
        }

        /* Hide form controls when minimized but keep heading, date and .key-hint visible */
        #ui-container.minimized > label,
        #ui-container.minimized hr,
        #ui-container.minimized .note {
            opacity: 0;
            max-height: 0;
            margin: 0;
            padding: 0;
            transform: translateX(-6px);
            pointer-events: none;
            transition: opacity 220ms ease, max-height 220ms ease, transform 220ms ease, margin 220ms ease;
        }

        #ui-container.minimized select,
        #ui-container.minimized input[type="date"],
        #ui-container.minimized input[type="range"] {
            opacity: 0;
            pointer-events: none;
        }

        #ui-container.minimized b,
        #ui-container.minimized #date-display,
        #ui-container.minimized .key-hint {
            opacity: 1;
        }
        #ui-container b {
            color: #f1c40f;
            font-size: 1.1em;
        }
        #ui-container label {
            display: block;
            margin-top: 12px;
            color: #b0c4de;
            font-size: 0.9em;
        }
        #ui-container select,
        #ui-container input[type="date"],
        #ui-container input[type="range"] {
            width: 100%;
            box-sizing: border-box;
            margin-top: 4px;
            padding: 6px 8px;
            background: #1e2a3a;
            color: white;
            border: 1px solid #3a5a7a;
            border-radius: 6px;
            font-size: 13px;
        }
        #ui-container input[type="checkbox"] {
            margin-right: 6px;
            transform: scale(1.1);
        }
        #date-display {
            color: #f1c40f;
            font-weight: bold;
            font-size: 14px;
            margin: 8px 0 4px;
            padding: 4px 0;
            border-bottom: 1px solid #3a5a7a;
        }
        #speed-val {
            color: #aad0ff;
            font-weight: 600;
        }
        hr {
            border-color: #3a5a7a;
            margin: 12px 0;
        }
        .note {
            font-size: 11px;
            color: #9bb;
            margin-top: 4px;
        }
        .key-hint {
            background: #1e2e42;
            padding: 5px 8px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 12px;
            border-left: 3px solid #f1c40f;
        }
        #hover-label {
            position: fixed;
            background: rgba(20, 20, 40, 0.95);
            color: #f1c40f;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #f1c40f;
            pointer-events: none;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
        }
        #focus-label {
            position: fixed;
            background: rgba(20, 20, 40, 0.95);
            color: #f1c40f;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #f1c40f;
            pointer-events: none;
            display: none;
            z-index: 1001;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
         #infobox-container {
             position: fixed;
             right: 10px;
             top: 10px;
             width: 350px;
             max-height: calc(100vh - 20px);
             background: rgba(10, 10, 20, 0.95);
             border: 1px solid #3a4a6a;
             border-radius: 12px;
             padding: 15px;
             color: #eee;
             font-size: 13px;
             overflow-y: auto;
             display: none;
             z-index: 999;
             backdrop-filter: blur(4px);
             box-shadow: 0 4px 20px rgba(0,0,0,0.7);
             transition: all 300ms ease, width 300ms ease, max-height 300ms ease;
         }
         #infobox-container.minimized {
             width: auto;
             max-height: 40px;
             padding: 8px 12px;
             overflow: hidden;
         }
         #infobox-container.minimized #infobox-content {
             display: none;
         }
         #infobox-title {
             color: #f1c40f;
             font-size: 16px;
             font-weight: bold;
             margin-bottom: 10px;
             border-bottom: 1px solid #3a5a7a;
             padding-bottom: 8px;
             display: flex;
             justify-content: space-between;
             align-items: center;
             gap: 10px;
         }
         #infobox-container.minimized #infobox-title {
             margin-bottom: 0;
             border-bottom: none;
             padding-bottom: 0;
         }
         .infobox-controls {
             display: flex;
             gap: 8px;
             white-space: nowrap;
         }
         #infobox-minimize, #infobox-close {
             color: #f1c40f;
             cursor: pointer;
             font-size: 18px;
             font-weight: bold;
             user-select: none;
             transition: color 200ms ease;
         }
         #infobox-minimize:hover, #infobox-close:hover {
             color: #ffff00;
         }
         .infobox-row {
             display: flex;
             margin-bottom: 8px;
             padding-bottom: 8px;
             border-bottom: 1px solid #2a3a4a;
         }
         .infobox-label {
             color: #aad0ff;
             font-weight: bold;
             min-width: 110px;
             flex-shrink: 0;
         }
         .infobox-value {
             color: #ddd;
             flex: 1;
             word-wrap: break-word;
         }
         .infobox-loading {
             color: #aad0ff;
             font-style: italic;
             text-align: center;
             padding: 20px 10px;
         }
         .infobox-error {
             color: #ff6b6b;
             text-align: center;
             padding: 20px 10px;
         }
    </style>
</head>
<body>
<div id="hover-label"></div>
<div id="focus-label"></div>
<div id="infobox-container">
    <div id="infobox-title">
        <span id="infobox-title-text"></span>
        <div class="infobox-controls">
            <span id="infobox-minimize" title="Minimize/Expand">−</span>
            <span id="infobox-close" title="Close">✕</span>
        </div>
    </div>
    <div id="infobox-content"></div>
</div>
<div id="ui-container">
    <b>☀️ Solar System Model</b>
    <hr>
    <div id="date-display">📅 Loading…</div>
    
    <label>📆 Simulation Date:
        <input type="date" id="datePicker">
    </label>
    
    <label>🎯 View Focus:
        <select id="focusSelect">
            <option value="free">Free Roam</option>
            <option value="Sun">☉ Sun</option>
              <optgroup label="── Inner System ──">
                  <option value="Mercury">☿ Mercury</option>
                  <option value="Venus">♀ Venus</option>
                  <option value="Earth">🜨 Earth</option>
                  <option value="Moon">&nbsp;&nbsp;&nbsp;☾ Moon</option>
                  <option value="Mars">♂ Mars</option>
                  <option value="Phobos">&nbsp;&nbsp;&nbsp;ϕ Phobos</option>
                  <option value="Deimos">&nbsp;&nbsp;&nbsp;Δ Deimos</option>
              </optgroup>
              <optgroup label="── Asteroid Belt ──">
                   <option value="Ceres">⚳ Ceres</option>
                   <option value="Vesta">★ Vesta</option>
                   <option value="Pallas">✦ Pallas</option>
                   <option value="Juno">◆ Juno</option>
                   <option value="Hebe">◇ Hebe</option>
                   <option value="Eros">𓀎 Eros</option>
               </optgroup>
              <optgroup label="── Outer System ──">
                  <option value="Jupiter">♃ Jupiter</option>
                  <option value="Io">&nbsp;&nbsp;&nbsp;Ἰ♃ Io</option>
                  <option value="Europa">&nbsp;&nbsp;&nbsp;Ε♃ Europa</option>
                  <option value="Ganymede">&nbsp;&nbsp;&nbsp;Γ♃ Ganymede</option>
                  <option value="Callisto">&nbsp;&nbsp;&nbsp;Κ♃ Callisto</option>
                  <option value="Saturn">♄ Saturn</option>
                  <option value="Uranus">⛢ Uranus</option>
                  <option value="Neptune">♆ Neptune</option>
			</optgroup>
			<optgroup label="── Plutino & Dwarf Planets ──">
                <option value="Pluto">♇ Pluto</option>
                <option value="Charon">&nbsp;&nbsp;&nbsp;☪ Charon</option>
                <option value="Eris">⊕ Eris</option>
                <option value="Haumea">◈ Haumea</option>
                <option value="Makemake">● Makemake</option>
			 </optgroup>
            <optgroup label="── Hypothetical ──">
                <option value="Planet9">🪐 Planet Nine</option>
            </optgroup>
        </select>
    </label>
    
    <label>🌍 System Filter:
        <select id="systemFilter">
            <option value="all" selected>All Planets and Moons</option>
            <option value="inner">Inner System (☿ ♀ ⊕ ♂ + moons)</option>
            <option value="outer">Outer System (♃ ♄ ♆ + moons)</option>
        </select>
    </label>
    
     <label><input type="checkbox" id="toggleOrbits" checked> Show Planet Orbits</label>
     <label><input type="checkbox" id="toggleMoonOrbits" checked> Show Moon Orbits</label>
     <label><input type="checkbox" id="toggleCameraLight" checked> 💡 Ambient Light</label>
     <label><input type="checkbox" id="toggleAnaglyph"> 🟥🟦 Anaglyph 3D Mode</label>
     <label><input type="checkbox" id="toggleTextures" checked> 🖼️ Show Textures</label>
     
     <label>⏩ Speed: <span id="speed-val">0.1 days/s</span>
        <input type="range" id="speedSlider" min="0" max="5" step="0.1" value="0.1">
    </label>
    
    <div class="key-hint">
        🖱️ Mouse:
        <br> Rotate camera (left-click + drag)
        <br> Pan (right-click + drag)
        <br> Zoom (wheel)

    </div>
</div>

<script src="three.js"></script>
<script src="OrbitControls.js"></script>
<script src="GLTFLoader.js"></script>
<script src="AnaglyphEffect.js"></script>
<script src="orrery-main.js"></script>
</body>
</html>
